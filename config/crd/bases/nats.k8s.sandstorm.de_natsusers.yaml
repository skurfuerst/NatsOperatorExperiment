---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: natsusers.nats.k8s.sandstorm.de
spec:
  group: nats.k8s.sandstorm.de
  names:
    kind: NatsUser
    listKind: NatsUserList
    plural: natsusers
    singular: natsuser
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.accountRef.name
      name: Account
      type: string
    - jsonPath: .status.nkeyPublicKey
      name: PublicKey
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: NatsUser is the Schema for the natsusers API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: NatsUserSpec defines the desired state of NatsUser.
            properties:
              accountRef:
                description: |-
                  AccountRef references the NatsAccount this user belongs to.
                  Can be cross-namespace if the NatsAccount's allowedUserNamespaces permits it.
                properties:
                  name:
                    description: Name of the referenced resource.
                    type: string
                  namespace:
                    description: |-
                      Namespace of the referenced resource.
                      If empty, defaults to the referring resource's namespace.
                    type: string
                required:
                - name
                type: object
              inboxPrefix:
                description: |-
                  InboxPrefix controls inbox isolation for this user's request-reply pattern.

                  Three modes:
                    - Omit entirely (nil): no inbox isolation; default NATS "_INBOX.*" is used.
                    - Empty string "":    operator auto-generates a random prefix, stores it in the
                                          user's Secret under key "inbox-prefix".
                    - Non-empty string:   use the provided prefix, also stored in the Secret.

                  When a prefix is active the operator automatically injects subscribe permissions:
                    - deny  "_INBOX.>"        (blocks the default inbox prefix)
                    - allow "<prefix>.>"      (permits only this user's inbox subjects)

                  The NATS client must use the same prefix:
                    nats.CustomInboxPrefix("<prefix>") in Go, or --inbox-prefix <prefix> in CLI.
                type: string
              permissions:
                description: Permissions defines publish/subscribe permissions for
                  this user.
                properties:
                  allowResponses:
                    description: |-
                      AllowResponses enables or configures response permissions for request-reply.
                      If set with no fields, emits "allow_responses: true".
                      If MaxMsgs or TTL is set, emits the structured form.
                    properties:
                      maxMsgs:
                        description: MaxMsgs is the maximum number of response messages
                          allowed.
                        type: integer
                      ttl:
                        description: TTL is the time window for responses (e.g., "5m",
                          "30s").
                        type: string
                    type: object
                  publish:
                    description: Publish defines publish permissions.
                    properties:
                      allow:
                        description: Allow is a list of subjects to allow.
                        items:
                          type: string
                        type: array
                      deny:
                        description: Deny is a list of subjects to deny.
                        items:
                          type: string
                        type: array
                    type: object
                  subscribe:
                    description: Subscribe defines subscribe permissions.
                    properties:
                      allow:
                        description: Allow is a list of subjects to allow.
                        items:
                          type: string
                        type: array
                      deny:
                        description: Deny is a list of subjects to deny.
                        items:
                          type: string
                        type: array
                    type: object
                type: object
            required:
            - accountRef
            type: object
          status:
            description: NatsUserStatus defines the observed state of NatsUser.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the user's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              nkeyPublicKey:
                description: NKeyPublicKey is the user's NKey public key (starts with
                  'U').
                type: string
              secretRef:
                description: SecretRef references the Secret containing the user's
                  NKey seed and public key.
                properties:
                  name:
                    description: Name of the Secret.
                    type: string
                required:
                - name
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
