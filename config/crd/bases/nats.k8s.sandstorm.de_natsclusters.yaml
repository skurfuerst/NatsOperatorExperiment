kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: natsclusters.nats.k8s.sandstorm.de
spec:
  group: nats.k8s.sandstorm.de
  names:
    kind: NatsCluster
    listKind: NatsClusterList
    plural: natsclusters
    singular: natscluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.accountCount
      name: Accounts
      type: integer
    - jsonPath: .status.userCount
      name: Users
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: NatsCluster is the Schema for the natsclusters API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: NatsClusterSpec defines the desired state of NatsCluster.
            properties:
              externalURLs:
                description: |-
                  ExternalURLs are NATS connection URLs reachable from outside the
                  Kubernetes cluster (e.g. via NodePort, LoadBalancer, or Ingress). They
                  are not used by the operator itself; they are propagated to
                  NatsUser.status.connectionURLs so external tools can discover how to
                  connect. Each entry should be a full URL such as nats://host:4222 or
                  tls://host:4222.
                items:
                  type: string
                type: array
              monitoringPort:
                default: 8222
                description: |-
                  MonitoringPort is the HTTP monitoring port on the NATS server pods.
                  Defaults to 8222. Used by the nats-debug CLI to query connection status.
                format: int32
                type: integer
              serverRef:
                description: |-
                  ServerRef optionally references the Deployment or StatefulSet running NATS.
                  When set, the controller annotates the workload's pod template with the
                  config hash, triggering a rolling restart on config changes.
                properties:
                  kind:
                    description: Kind is the workload type.
                    enum:
                    - Deployment
                    - StatefulSet
                    type: string
                  name:
                    description: Name of the Deployment or StatefulSet.
                    type: string
                required:
                - kind
                - name
                type: object
            type: object
          status:
            description: NatsClusterStatus defines the observed state of NatsCluster.
            properties:
              accountCount:
                description: AccountCount is the number of NatsAccounts associated
                  with this cluster.
                type: integer
              conditions:
                description: Conditions represent the latest available observations
                  of the cluster's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastConfigHash:
                description: LastConfigHash is the SHA256 hash of the last generated
                  NATS config.
                type: string
              userCount:
                description: UserCount is the total number of NatsUsers across all
                  accounts.
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
