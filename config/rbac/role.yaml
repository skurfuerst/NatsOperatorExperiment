---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - nats.k8s.sandstorm.de
  resources:
  - natsclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - nats.k8s.sandstorm.de
  resources:
  - natsclusters/finalizers
  verbs:
  - update
- apiGroups:
  - nats.k8s.sandstorm.de
  resources:
  - natsclusters/status
  verbs:
  - get
  - patch
  - update
