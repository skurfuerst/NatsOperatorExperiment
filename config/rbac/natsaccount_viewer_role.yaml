# This rule is not used by the project natsoperatorexperiment itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to nats.k8s.sandstorm.de resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: natsoperatorexperiment
    app.kubernetes.io/managed-by: kustomize
  name: natsaccount-viewer-role
rules:
- apiGroups:
  - nats.k8s.sandstorm.de
  resources:
  - natsaccounts
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - nats.k8s.sandstorm.de
  resources:
  - natsaccounts/status
  verbs:
  - get
